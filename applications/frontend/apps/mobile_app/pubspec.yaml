name: mobile_app
description: Minimal mobile app for Workout-Planner
version: 0.0.1
environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  rummel_blue_theme:
    path: ../../../../resources/rummel_blue_theme
  widgets:
    path: ../../packages/widgets
  goals_ui:
    path: ../../packages/goals_ui
  readiness_ui:
    path: ../../packages/readiness_ui
  home_dashboard_ui:
    path: ../../packages/home_dashboard_ui
  # notification_system:
  #   path: ../../packages/notification_system
  settings_profile_ui:
    path: ../../packages/settings_profile_ui
  todays_workout_ui:
    path: ../../packages/todays_workout_ui
  weekly_plan_ui:
    path: ../../packages/weekly_plan_ui
  ai_insights_ui:
    path: ../../packages/ai_insights_ui

  # Ensure plugins used by transitive packages are registered at app level
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
