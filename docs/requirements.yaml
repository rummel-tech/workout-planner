non_functional_requirements:

  performance:
    description: System performance targets
    requirements:
    - id: PERF-001
      title: API response time
      target: "< 200ms (p95)"
      priority: P0
      status: implemented

    - id: PERF-002
      title: App cold start
      target: "< 3 seconds"
      priority: P1
      status: partial

    - id: PERF-003
      title: Health sync time
      target: "< 10 seconds (100 samples)"
      priority: P1
      status: implemented

    - id: PERF-004
      title: Cached response time
      target: "< 50ms"
      priority: P1
      status: implemented

  scalability:
    description: System scalability targets
    requirements:
    - id: SCALE-001
      title: Concurrent users
      target: "1,000+"
      priority: P1
      status: planned

    - id: SCALE-002
      title: Health samples per user
      target: "100,000+"
      priority: P1
      status: implemented

    - id: SCALE-003
      title: Chat messages per session
      target: "1,000+"
      priority: P2
      status: implemented

  availability:
    description: System availability targets
    requirements:
    - id: AVAIL-001
      title: API uptime
      target: "99.9%"
      priority: P0
      status: partial

    - id: AVAIL-002
      title: Redis fallback
      description: Graceful degradation when Redis unavailable
      priority: P1
      status: implemented

    - id: AVAIL-003
      title: Offline mode
      description: Offline mode for mobile app
      priority: P2
      status: not_started

  security:
    description: Security requirements
    requirements:
    - id: SEC-001
      title: JWT authentication
      priority: P0
      status: implemented

    - id: SEC-002
      title: Password hashing
      description: bcrypt with salt
      priority: P0
      status: implemented

    - id: SEC-003
      title: Token blacklisting
      description: Token blacklisting on logout
      priority: P1
      status: implemented

    - id: SEC-004
      title: Secure storage
      description: flutter_secure_storage for API keys
      priority: P0
      status: implemented

    - id: SEC-005
      title: HTTPS enforcement
      priority: P0
      status: implemented

    - id: SEC-006
      title: Security headers
      description: CSP, X-Frame-Options, HSTS
      priority: P1
      status: implemented

    - id: SEC-007
      title: Rate limiting
      description: Rate limiting on auth endpoints
      priority: P1
      status: implemented

