# Workout Planner - Requirements
# Version: 1.0
# Generated: 2024-12-24
#
# Priority Levels:
#   P0 - Critical: Must have for MVP
#   P1 - High: Important for complete experience
#   P2 - Medium: Nice to have
#   P3 - Low: Future consideration
#
# Status Values:
#   implemented, partial, planned, not_started

metadata:
  project: Workout Planner
  version: "1.0"
  last_updated: "2024-12-24"

functional_requirements:
  onboarding:
    description: First-time user setup and configuration
    requirements:
    - id: ONBOARD-001
      title: Join waiting list. New users register by completing a profile.
      description: When a new user navigates to the site they can join the waitlist by entering their email address. The email is persisted to the database. Admins can then assign a registration code to the user which will be emailed to them.
      priority: P0
      status: implemented
      implementation_notes: |
        Backend: POST /waitlist endpoint (routers/waitlist.py)
        Frontend: "Join Waitlist" form on RegisterScreen (packages/home_dashboard_ui/lib/screens/register_screen.dart)
        Database: waitlist table with id, email (unique), created_at
        Tests: test_waitlist_join_success, test_waitlist_duplicate_rejected in tests/test_auth.py

    - id: ONBOARD-002
      title: Register a new user
      description: Users complete registration by using the registration code and creating credentials for the application. At which time they  become an active user in the system.
      priority: P1
      status: implemented

    - id: ONBOARD-003
      title: AI provider configuration
      description: Users can configure AI provider (OpenAI/Anthropic)
      priority: P1
      status: implemented

    - id: ONBOARD-004
      title: HealthKit toggle
      description: Users can enable/disable HealthKit integration
      priority: P1
      status: implemented

  authentication:
    description: User authentication and account management
    requirements:
    - id: AUTH-001
      title: Email/password registration with code
      description: Users can register with email, password, and registration code
      priority: P0
      status: implemented

    - id: AUTH-002
      title: Email/password login
      description: Users can log in with email and password
      priority: P0
      status: implemented

    - id: AUTH-003
      title: Google OAuth login
      description: Users can log in with Google OAuth
      priority: P1
      status: implemented

    - id: AUTH-004
      title: Password reset
      description: Users can reset password via email
      priority: P1
      status: implemented

    - id: AUTH-005
      title: Registration code validation
      description: System validates registration codes before account creation
      priority: P0
      status: implemented

    - id: AUTH-006
      title: Waitlist fallback
      description: Users without valid code are added to waitlist
      priority: P1
      status: implemented

    - id: AUTH-007
      title: Auto token refresh
      description: JWT tokens refresh automatically when expired
      priority: P0
      status: implemented

    - id: AUTH-008
      title: Admin code generation
      description: Admin users can generate registration codes
      priority: P1
      status: implemented

    - id: AUTH-009
      title: Admin waitlist management
      description: Admin users can invite users from waitlist
      priority: P2
      status: implemented

